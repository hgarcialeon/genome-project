# RFC-0007 evidence case 4: a policy applied to BOTH an agent and one of its
# owned workflows explicitly (the current workaround). The workflow must carry
# exactly one requires edge to the policy — no double-gating.
genomeVersion: 0.1

company:
  name: Double Gating Fixture

departments:
  engineering:
    agents:
      engineering-agent:
        role: Engineering Agent
        autonomy: supervised

workflows:
  implement-queue-item:
    owner: engineering.engineering-agent
    steps:
      - implement

policies:
  queue-discipline:
    appliesTo:
      - engineering.engineering-agent
      - implement-queue-item
    requiresApprovalFrom:
      - human:product-owner
